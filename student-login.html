<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Login – Kalvimini Online Tuition</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --blue:#1a73e8;--blue-dark:#1557b0;--blue-light:#e8f0fe;
      --text:#1f2937;--text-mid:#6b7280;--border:#e2e8f0;
      --white:#fff;--bg:#f0f4ff;--red:#ea4335;--green:#34a853;
    }
    body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
    .topbar{background:var(--blue-dark);color:#fff;text-align:center;padding:8px;font-size:0.82rem}
    .topbar a{color:#bfd4ff}
    .login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
    .login-box{background:var(--white);border-radius:20px;box-shadow:0 8px 40px rgba(26,115,232,0.15);width:100%;max-width:440px;overflow:hidden}
    .login-header{background:linear-gradient(135deg,var(--blue),var(--blue-dark));padding:36px 32px;text-align:center;color:#fff}
    .login-header .logo{font-size:2rem;font-weight:900;letter-spacing:-1px}
    .login-header .logo span{color:#fbbc04}
    .login-header p{font-size:0.88rem;opacity:0.85;margin-top:6px}
    .login-body{padding:32px}
    .login-body h2{font-size:1.3rem;font-weight:800;margin-bottom:6px;color:var(--text)}
    .login-body .subtitle{font-size:0.88rem;color:var(--text-mid);margin-bottom:24px}
    .form-group{margin-bottom:18px}
    .form-group label{display:block;font-size:0.85rem;font-weight:700;margin-bottom:6px;color:var(--text-mid)}
    .form-group input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-family:'Nunito',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s;background:var(--bg);color:var(--text)}
    .form-group input:focus{border-color:var(--blue);background:#fff}
    .input-wrap{position:relative}
    .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem}
    .input-wrap input{padding-left:40px}
    .btn-login{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:background 0.2s,transform 0.15s;margin-top:4px}
    .btn-login:hover{background:var(--blue-dark);transform:translateY(-1px)}
    .btn-login:disabled{background:#94a3b8;cursor:not-allowed;transform:none}
    .error-msg{background:#fef2f2;border:1px solid #fecaca;color:var(--red);padding:10px 14px;border-radius:8px;font-size:0.88rem;font-weight:600;margin-bottom:16px;display:none}
    .login-footer{text-align:center;padding:16px 32px 24px;border-top:1px solid var(--border);font-size:0.83rem;color:var(--text-mid)}
    .login-footer a{color:var(--blue);font-weight:700}
  </style>
</head>
<body>
  <div class="topbar">📚 Kalvimini Online Tuition — Student Portal &nbsp;|&nbsp; <a href="index.html">← Back to Website</a></div>

  <div class="login-wrap">
    <div class="login-box">
      <div class="login-header">
        <div class="logo">Kalvi<span>mini</span></div>
        <p>Student Portal — Online Tuition</p>
      </div>
      <div class="login-body">
        <h2>Student Login</h2>
        <p class="subtitle">Enter your User ID and Password given by your teacher</p>

        <div class="error-msg" id="errorMsg"></div>

        <div class="form-group">
          <label>User ID</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="userId" placeholder="Enter your User ID (e.g. KM001)" autocomplete="username"/>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
          </div>
        </div>
        <button class="btn-login" id="loginBtn" onclick="handleLogin()">Login to My Dashboard →</button>
      </div>
      <div class="login-footer">
        Forgot your login details? Contact your teacher<br/>
        <a href="contact.html">📞 Contact Kalvimini</a>
      </div>
    </div>
  </div>

  <!-- ✅ Firebase Compat SDK (no module needed) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    // ✅ FIXED: Firebase config correctly declared
    const firebaseConfig = {
      apiKey: "AIzaSyAOxnYuGOUi9VrrACQIp48cgaWQmBJBuBc",
      authDomain: "kalvimini-tuition.firebaseapp.com",
      projectId: "kalvimini-tuition",
      storageBucket: "kalvimini-tuition.firebasestorage.app",
      messagingSenderId: "591716839478",
      appId: "1:591716839478:web:e0d5c380dad521f1306897"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function handleLogin() {
      const userId   = document.getElementById('userId').value.trim().toUpperCase();
      const password = document.getElementById('password').value.trim();
      const loginBtn = document.getElementById('loginBtn');

      document.getElementById('errorMsg').style.display = 'none';

      if (!userId || !password) {
        showError('❌ Please enter both User ID and Password.');
        return;
      }

      loginBtn.textContent = '⏳ Logging in...';
      loginBtn.disabled = true;

      // Step 1: Get student record from Firestore using User ID
      db.collection('students').doc(userId).get()
        .then(snap => {
          if (!snap.exists) {
            throw new Error('Student not found. Check your User ID.');
          }
          const data = snap.data();
          // Step 2: Sign in with Firebase Auth using the stored fake email
          return auth.signInWithEmailAndPassword(data.email, password)
            .then(() => data); // pass data along
        })
        .then(data => {
          // Step 3: Save info to sessionStorage and redirect
          sessionStorage.setItem('studentId',    userId);
          sessionStorage.setItem('studentName',  data.name);
          sessionStorage.setItem('studentClass', data.class);
          sessionStorage.setItem('rollNumber',   data.rollNumber);
          window.location.href = 'student-dashboard.html';
        })
        .catch(err => {
          showError('❌ Invalid User ID or Password. Please try again.');
          loginBtn.textContent = 'Login to My Dashboard →';
          loginBtn.disabled = false;
        });
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
